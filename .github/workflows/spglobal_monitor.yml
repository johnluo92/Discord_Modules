name: S&P Global Press Room Monitor

on:
  schedule:
    - cron: '0 21 * * 1-5'   # Monday–Friday 5 PM ET (21:00 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - test

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          MODE="${{ github.event.inputs.mode || 'normal' }}"
          if [ "$MODE" = "test" ]; then
            python3 spglobal_tracker.py --test
          else
            python3 spglobal_tracker.py
          fi

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add spglobal_state.json
          git diff --cached --quiet || git commit -m "chore: update spglobal state [skip ci]"
          git push
